<div class="section">
  <h2>Website Settings</h2>
  <p class="muted" style="margin-top:-6px;">Update the welcome photo shown on the customer page.</p>

  <div class="notice" style="margin-bottom:10px;">
    Current welcome photo:
    {% if hero_image_url %}
      <span class="muted">Uploaded ✅</span>
    {% else %}
      <span class="muted">Not set (using placeholder)</span>
    {% endif %}
  </div>

  <form action="{{ url_for('admin_update_hero') }}" method="POST" enctype="multipart/form-data">
    <div class="form-row">
      <div class="field">
        <label>Upload welcome photo</label>
        <input name="hero_image" type="file" accept="image/*" required>
      </div>

      <div class="field full">
        <button class="btn primary" type="submit">Save Welcome Photo 💾</button>
      </div>
    </div>
  </form>
</div>

<hr class="hr"/>
